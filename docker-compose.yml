version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pass-generator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pass-generator-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: ${BACKEND_PORT}
      NODE_ENV: ${NODE_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: pass-generator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
    ports:
      - "19006:19006"
    volumes:
      - ./Frontend:/app
      - /app/node_modules

volumes:
  pgdata:
